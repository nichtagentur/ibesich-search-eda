<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moving Bars - ibesich.at Search Performance</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #d9e2ec;
      --paper: #ffffff;
      --wash: #f3f7fb;
      --blue: #1463a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background: #eef4f8;
    }
    main {
      max-width: 1120px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px;
      background: var(--paper);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 740px;
    }
    a {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-weight: 700;
      white-space: nowrap;
      background: #fff;
    }
    .stage {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 14px 34px rgba(19, 39, 58, .06);
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }
    #date {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0;
    }
    #total {
      color: var(--muted);
      font-weight: 700;
      text-align: right;
    }
    .bars {
      display: grid;
      gap: 12px;
      min-height: 346px;
    }
    .row {
      display: grid;
      grid-template-columns: 190px 1fr 82px;
      gap: 12px;
      align-items: center;
    }
    .name {
      font-size: 15px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .track {
      height: 38px;
      border-radius: 6px;
      background: #edf2f6;
      border: 1px solid #dce5ed;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0;
      border-radius: 5px;
      transition: width .38s ease, background-color .38s ease;
    }
    .value {
      text-align: right;
      font-size: 16px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    button {
      font: inherit;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #fff;
      border-radius: 6px;
      padding: 9px 13px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    label {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] { width: 180px; }
    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 720px) {
      main { padding: 16px; }
      header, .meta { grid-template-columns: 1fr; display: grid; }
      .row { grid-template-columns: 116px 1fr 54px; }
      .track { height: 30px; }
      #total { text-align: left; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Moving Bars</h1>
        <p>Tägliche Google-Search-Klicks je Landingpage im Zeitverlauf. Die Balken sortieren sich pro Tag nach Klickstärke.</p>
      </div>
      <a href="index.html">Zurück zum Dashboard</a>
    </header>

    <section class="stage">
      <div class="meta">
        <div id="date">Lade Daten...</div>
        <div id="total"></div>
      </div>
      <div id="bars" class="bars"></div>
      <div class="controls">
        <button id="playPause" type="button">Pause</button>
        <button id="restart" type="button" class="secondary">Neu starten</button>
        <label>
          Geschwindigkeit
          <input id="speed" type="range" min="150" max="1200" value="650" step="50">
        </label>
      </div>
      <div class="note">Datenquelle: `daily_all.csv`, Zeitraum 2026-02-04 bis 2026-05-03.</div>
    </section>
  </main>

  <script>
    const colors = {
      "rechner": "#1463a5",
      "unterhalt-alimente": "#b93838",
      "vermoegensaufteilung": "#1c7c54",
      "kinder-obsorge": "#7b4db3",
      "strittig": "#b27a18",
      "einvernehmlich": "#257c8a"
    };
    const fmt = new Intl.NumberFormat("de-DE");
    let rows = [];
    let dates = [];
    let index = 0;
    let timer = null;
    let playing = true;

    function parseCsv(text) {
      const out = [];
      let row = [], cell = "", quoted = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i + 1];
        if (c === '"' && quoted && n === '"') { cell += '"'; i++; continue; }
        if (c === '"') { quoted = !quoted; continue; }
        if (c === "," && !quoted) { row.push(cell); cell = ""; continue; }
        if ((c === "\n" || c === "\r") && !quoted) {
          if (c === "\r" && n === "\n") i++;
          row.push(cell); cell = "";
          if (row.some(v => v !== "")) out.push(row);
          row = [];
          continue;
        }
        cell += c;
      }
      if (cell || row.length) { row.push(cell); out.push(row); }
      const headers = out.shift();
      return out.map(r => Object.fromEntries(headers.map((h, i) => [h, r[i] || ""])));
    }

    function render() {
      const date = dates[index];
      const day = rows.filter(r => r.date === date).sort((a, b) => b.clicks - a.clicks);
      const max = Math.max(...day.map(r => r.clicks), 1);
      const total = day.reduce((sum, r) => sum + r.clicks, 0);
      document.getElementById("date").textContent = date;
      document.getElementById("total").textContent = fmt.format(total) + " Klicks gesamt";
      document.getElementById("bars").innerHTML = day.map(r => `
        <div class="row">
          <div class="name" title="${r.slug}">${r.slug}</div>
          <div class="track"><div class="fill" style="width:${(r.clicks / max * 100).toFixed(1)}%; background:${colors[r.slug] || "#1463a5"}"></div></div>
          <div class="value">${fmt.format(r.clicks)}</div>
        </div>
      `).join("");
    }

    function tick() {
      index = (index + 1) % dates.length;
      render();
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(tick, Number(document.getElementById("speed").value));
    }

    document.getElementById("playPause").addEventListener("click", () => {
      playing = !playing;
      document.getElementById("playPause").textContent = playing ? "Pause" : "Abspielen";
      if (playing) startTimer();
      else clearInterval(timer);
    });
    document.getElementById("restart").addEventListener("click", () => {
      index = 0;
      render();
    });
    document.getElementById("speed").addEventListener("input", () => {
      if (playing) startTimer();
    });

    fetch("daily_all.csv")
      .then(r => r.text())
      .then(text => {
        rows = parseCsv(text).map(r => ({ slug: r.slug, date: r.date, clicks: Number(r.clicks) || 0 }));
        dates = [...new Set(rows.map(r => r.date))].sort();
        render();
        startTimer();
      })
      .catch(() => {
        document.getElementById("date").textContent = "Daten konnten nicht geladen werden";
      });
  </script>
</body>
</html>
